<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Niche – Preferences</title>
  <link rel="stylesheet" href="match-form.css" />
  <style>
    .tk-spinner {
      display: none;
      width: 40px;
      height: 40px;
      margin: 20px auto;
      border: 4px solid #c8e6c9;
      border-top-color: #2e7d32;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }
    .checkbox-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 2px solid #ddd;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .checkbox-chip input { display: none; }
    .checkbox-chip.checked {
      border-color: #00b894;
      background: #e8f8f5;
      color: #00b894;
      font-weight: 600;
    }
    .section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #2e7d32;
      margin: 20px 0 10px;
      padding-bottom: 4px;
      border-bottom: 2px solid #e0e0e0;
    }
    .recency-btn {
      padding: 10px 20px;
      border: 2px solid #ddd;
      border-radius: 20px;
      cursor: pointer;
      background: white;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .recency-btn.active {
      border-color: #00b894;
      background: #00b894;
      color: white;
      font-weight: 600;
    }
    .tk-toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .tk-toggle-row label { flex: 1; margin: 0; }
    .toggle-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      border-radius: 26px;
      transition: .3s;
    }
    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 18px; width: 18px;
      left: 4px; bottom: 4px;
      background-color: white;
      border-radius: 50%;
      transition: .3s;
    }
    input:checked + .toggle-slider { background-color: #00b894; }
    input:checked + .toggle-slider:before { transform: translateX(24px); }
  </style>
</head>
<body>
  <div id="spinnerOverlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;align-items:center;justify-content:center;">
    <div class="tk-spinner" style="display:block;"></div>
  </div>

  <header class="tk-header">Niche</header>

  <main class="tk-container">
    <form id="preferencesForm" class="tk-form">
      <h2 id="prefTitle">Your Preferences</h2>

      <!-- SEEKER PREFERENCES -->
      <div id="seekerPrefs">
        <div class="section-title">Workplace Preferences</div>

        <label>Preferred Work Mode <span style="color:#888;font-size:0.85rem;">(select all that apply)</span></label>
        <div class="checkbox-group" id="workModeGroup">
          <label class="checkbox-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="work_mode" value="Remote" /> Remote
          </label>
          <label class="checkbox-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="work_mode" value="Hybrid" /> Hybrid
          </label>
          <label class="checkbox-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="work_mode" value="On-site" /> On-site
          </label>
        </div>

        <label>Preferred Company Size</label>
        <div class="checkbox-group" id="companySizeGroup">
          <label class="checkbox-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="company_size" value="Startup" /> Startup
          </label>
          <label class="checkbox-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="company_size" value="Mid-size" /> Mid-size
          </label>
          <label class="checkbox-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="company_size" value="Corporate" /> Corporate
          </label>
        </div>

        <div class="section-title">Target Industry</div>
        <label>Industries you want to work in <span style="color:#888;font-size:0.85rem;">(select all that apply)</span></label>
        <div class="checkbox-group" id="targetIndustryGroup">
          <label class="checkbox-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="target_industry" value="Engineering & Tech" /> Engineering & Tech
          </label>
          <label class="checkbox-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="target_industry" value="Business & Admin" /> Business & Admin
          </label>
          <label class="checkbox-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="target_industry" value="Health & Sciences" /> Health & Sciences
          </label>
          <label class="checkbox-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="target_industry" value="Arts & Design" /> Arts & Design
          </label>
          <label class="checkbox-chip" onclick="toggleChip(this)">
            <input type="checkbox" name="target_industry" value="Humanities/Social" /> Humanities/Social
          </label>
        </div>

        <div class="section-title">Recency Filter</div>
        <label>Show companies based on post date</label>
        <div style="display:flex;gap:12px;margin-top:8px;">
          <button type="button" class="recency-btn active" id="recencyAny" onclick="setRecency('any')">All Time</button>
          <button type="button" class="recency-btn" id="recencyToday" onclick="setRecency('today')">Posted Today</button>
        </div>
        <input type="hidden" name="pref_recency" id="recencyValue" value="any" />
      </div>

      <!-- EMPLOYER PREFERENCES -->
      <div id="employerPrefs" style="display:none;">
        <div class="section-title">Candidate Demographics</div>

        <label>Gender Preference</label>
        <select name="pref_gender">
          <option value="Any">Any</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>

        <label>Minimum Candidate Age</label>
        <input type="number" name="pref_age_min" min="18" max="65" placeholder="e.g. 21" />

        <div class="section-title">Required Qualifications</div>

        <label>Required Major Category</label>
        <select name="pref_country_of_birth" id="reqMajor">
          <option value="">Any Major</option>
          <option value="Engineering & Tech">Engineering & Tech</option>
          <option value="Business & Admin">Business & Admin</option>
          <option value="Health & Sciences">Health & Sciences</option>
          <option value="Arts & Design">Arts & Design</option>
          <option value="Humanities/Social">Humanities/Social</option>
        </select>

        <label>Required Sub-Major</label>
        <select name="pref_country_of_residence" id="reqSubMajor">
          <option value="">Any Sub-Major</option>
        </select>

        <label>Minimum Education Level</label>
        <select name="pref_education">
          <option value="">Any Level</option>
          <option value="Certificate">Certificate</option>
          <option value="Diploma">Diploma</option>
          <option value="Bachelor's">Bachelor's</option>
          <option value="Master's">Master's</option>
          <option value="PhD">PhD</option>
        </select>

        <div class="section-title">Logistics Requirements</div>

        <div class="tk-toggle-row">
          <label>Candidate Must Be Willing to Relocate</label>
          <label class="toggle-switch">
            <input type="checkbox" name="pref_willing_to_relocate" value="Yes" id="requireRelocation" />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="tk-toggle-row">
          <label>Night Shift Required</label>
          <label class="toggle-switch">
            <input type="checkbox" name="pref_smoking" value="Yes" id="requireNightShift" />
            <span class="toggle-slider"></span>
          </label>
        </div>

        <div class="section-title">Recency Filter</div>
        <label>Show candidates who applied</label>
        <div style="display:flex;gap:12px;margin-top:8px;">
          <button type="button" class="recency-btn active" id="recencyAnyEmp" onclick="setRecency('any')">All Time</button>
          <button type="button" class="recency-btn" id="recencyTodayEmp" onclick="setRecency('today')">Applied Today</button>
        </div>
        <input type="hidden" name="pref_recency" id="recencyValueEmp" value="any" />
      </div>

      <div class="tk-spinner" id="spinner"></div>
      <button type="submit" id="submitBtn">Finish Setup</button>
    </form>
  </main>

  <script src="config.js"></script>
  <script src="preferences.js"></script>
</body>
</html>
