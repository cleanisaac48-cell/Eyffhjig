<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Niche Dashboard</title>
  <link rel="stylesheet" href="dashboard_style.css">
</head>
<body>
  <div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="profile-section">
          <div class="profile-icon">
            <img id="sidebarProfilePhoto" src="https://via.placeholder.com/100" alt="Profile">
          </div>
          <div class="profile-name" id="sidebarUserName"></div>
          <div id="sidebarRoleBadge" style="font-size:0.75rem;background:#e8f8f5;color:#00b894;padding:3px 10px;border-radius:10px;margin-top:4px;display:inline-block;"></div>
        </div>
      </div>

      <nav class="nav-links">
        <a href="#" class="nav-item active">
          <span class="nav-text">Dashboard</span>
        </a>
        <a href="#" onclick="checkChartsAccess(event)" class="nav-item">
          <span class="nav-text">Charts</span>
        </a>
        <a href="subscriptions.html" class="nav-item">
          <span class="nav-text">Subscriptions</span>
        </a>
      </nav>

      <div class="sidebar-bottom">
        <div class="contact-info">
          <p class="support-email">support@nicheapp.co</p>
        </div>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <!-- Header -->
      <header class="header">
        <div class="menu-icon" id="menuToggle">☰</div>
        <h1 class="site-title">Niche</h1>
        <div class="header-actions">
          <a href="#">Log out</a>
          <div class="settings-icon">⚙️</div>
        </div>
      </header>

      <!-- Filter Buttons - seeker view (default) -->
      <div class="filters" id="seekerFilters">
        <button class="active" data-section="matches">Companies</button>
        <button data-section="applied">Applied</button>
        <button data-section="shortlisted">Shortlisted</button>
      </div>

      <!-- Filter Buttons - employer view -->
      <div class="filters" id="employerFilters" style="display:none;">
        <button class="active" data-section="applications">Applications</button>
        <button data-section="shortlisted_by_me">Shortlisted</button>
        <button data-section="chat_enabled">Allowed to Chat</button>
      </div>

      <!-- Loading Spinner -->
      <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>

      <!-- Profiles List -->
      <div class="profiles-list" id="user-container"></div>
    </main>
  </div>

  <!-- Floating Profile Photo -->
  <div id="floatingProfilePhoto" class="floating-profile-photo" style="display: none;">
    <button id="closeProfileBtn" class="close-btn">X</button>
    <img id="floatingProfilePic" src="" alt="Profile" class="profile-pic">
    <button id="viewProfileBtn">View Profile</button>
  </div>

  <script src="config.js"></script>
  <script src="dashboard_script.js"></script>

  <script>
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.querySelector('.sidebar');
    const mainContent = document.querySelector('.main-content');

    menuToggle.addEventListener('click', () => {
      sidebar.classList.toggle('sidebar-visible');
      if (window.innerWidth <= 768) {
        mainContent.style.marginLeft = sidebar.classList.contains('sidebar-visible') ? '25vw' : '0';
      } else {
        mainContent.style.marginLeft = sidebar.classList.contains('sidebar-visible') ? '220px' : '0';
      }
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth <= 768) {
        mainContent.style.marginLeft = sidebar.classList.contains('sidebar-visible') ? '25vw' : '0';
      } else {
        mainContent.style.marginLeft = sidebar.classList.contains('sidebar-visible') ? '220px' : '0';
      }
    });
  </script>
</body>
</html>
